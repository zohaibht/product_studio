name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      # STEP 3: API Key setup
      - name: Create Environment File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

      # Naya Step: Agar Capacitor use kar rahe hain to android folder generate karna
      - name: Build Web and Sync Android
        run: |
          npm run build --if-present
          if [ -f "capacitor.config.json" ] || [ -f "capacitor.config.ts" ]; then
            npx cap sync android || npx cap add android
          fi

      # STEP 6: Android Build (Check ke folder exist karta hai ya nahi)
      - name: Build Android Debug APK
        run: |
          if [ -d "android" ]; then
            cd android && ./gradlew assembleDebug
          else
            echo "Error: Android folder still not found!"
            exit 1
          fi

      # STEP 7: Upload APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-App-Build
          path: "**/*.apk" # Ye saari APKs dhoond lega chahay folder kahin bhi ho
