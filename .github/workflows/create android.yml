name: Build Android App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 21
        # Aapka error 'source release: 21' mang raha tha, isliye yahan 21 set kiya hai
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        # GitHub web par 'npm install' zyada reliable hai lockfile errors se bachne ke liye
        run: |
          npm install
          npm install @capacitor/cli @capacitor/android @capacitor/core

      - name: Build Web Assets
        # Capacitor ko build folder (dist/www) chahiye hota hai sync ke liye
        run: npm run build

      - name: Capacitor Android Sync
        run: |
          # Agar android folder exist nahi karta toh create karega
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android Release
        run: |
          cd android
          # Execution permission dena zaroori hai runner ke liye
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
