name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Build React App (Vite)
        # Yahan GitHub Secrets se keys utha kar build process mein di ja rahi hain
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup and Sync Capacitor
        # Is step mein CLI install karke platform setup kiya ja raha hai
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          rm -rf android
          npx cap init Lumina com.lumina.app --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Lumina-Studio-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
