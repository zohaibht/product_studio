name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Thora latest version use karte hain
          cache: 'npm'       # Cache enable karne se speed barhti hai

      # Purani node_modules aur lock file ka jhanjhat khatam karne ke liye
      - name: Install Dependencies
        run: |
          npm install -g npm@latest
          npm ci || npm install # npm ci fast aur clean hota hai

      - name: Create Environment File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

      # Tailwind/Vite error ko bypass karne ke liye build step
      - name: Build Web
        run: npm run build --if-present

      # Android check aur build
      - name: Build Android Debug APK
        run: |
          if [ -d "android" ]; then
            cd android && ./gradlew assembleDebug
          else
            # Agar capacitor use kar rahe hain to pehle android folder banayein
            npx cap add android || true
            npx cap sync android || true
            cd android && ./gradlew assembleDebug
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-App-Build
          path: "**/*.apk"
